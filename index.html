<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>光迹计划（北京）</title>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #e8e8e3;
      --button: #111111;
      --buttonText: #ffffff;
      --secondary: #f0f0ec;
      --danger: #8a3b12;
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% -8%, rgba(17,17,17,0.08), transparent 34%),
        linear-gradient(180deg, #fbfbf8 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.55;
    }

    .page {
      width: min(560px, 100%);
      margin: 0 auto;
      padding: 24px 16px 34px;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.055);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(17,17,17,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(17,17,17,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.28), transparent 52%);
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .header {
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #111111;
      box-shadow: 0 0 0 4px rgba(17,17,17,0.08);
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .title-en {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .task-list {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 2px 0 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .btn {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 58px;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid var(--button);
      background: var(--button);
      color: var(--buttonText);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, opacity .12s ease, box-shadow .12s ease;
    }

    .btn:active {
      transform: scale(0.992);
    }

    .btn.secondary {
      background: var(--secondary);
      border-color: var(--secondary);
      color: var(--text);
    }

    .btn .code {
      width: 34px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      background: rgba(255,255,255,0.12);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .04em;
    }

    .btn.secondary .code {
      background: rgba(17,17,17,0.065);
      color: var(--muted);
    }

    .btn .main {
      min-width: 0;
    }

    .btn .name {
      display: block;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .btn .desc {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      font-weight: 400;
      opacity: .7;
      line-height: 1.25;
    }

    .btn .hint {
      flex: 0 0 auto;
      color: inherit;
      opacity: .62;
      font-size: 20px;
      line-height: 1;
    }

    .notice {
      margin-top: 16px;
      padding: 14px 14px;
      border-radius: 14px;
      background: #fff7ed;
      border: 1px solid #f3dcc7;
      color: var(--danger);
      font-size: 14px;
    }

    .notice p { margin: 0 0 6px; }
    .notice p:last-child { margin-bottom: 0; }

    .notice-title {
      margin: 10px 0 4px;
      font-weight: 700;
      color: var(--danger);
    }

    .notice-list {
      margin: 4px 0 0;
      padding-left: 18px;
    }

    .notice-list li {
      margin-bottom: 4px;
    }

    .notice-list li:last-child {
      margin-bottom: 0;
    }

    .contact {
      margin-top: 12px;
      padding: 13px 14px;
      border-radius: 14px;
      background: #f5f5f1;
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 14px;
    }

    .contact .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .contact a {
      color: var(--text);
      text-decoration: none;
      font-weight: 760;
      letter-spacing: .02em;
    }

    .footer {
      margin-top: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.6;
    }

    .footer strong {
      color: var(--text);
      font-weight: 650;
    }

    @media print {
      body { background: #fff; }
      .page { padding: 0; }
      .card { box-shadow: none; border: 1px solid #ddd; }
      .card::before { display: none; }
      .btn { color: #111; background: #fff; border: 1px solid #111; }
      .btn.secondary { background: #fff; }
      .btn .code,
      .btn.secondary .code { background: #fff; color: #111; border: 1px solid #ddd; }
      .notice { background: #fff; border: 1px solid #ddd; color: #111; }
      .notice-title { color: #111; }
      .contact { background: #fff; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="study-title">
      <header class="header">
        <div class="meta-row">
          <span>Field Observation Console</span>
          <span class="status">Online</span>
        </div>
        <h1 class="title" id="study-title">光迹计划（北京）</h1>
        <p class="title-en">LightTrace Beijing</p>
        <p class="subtitle" id="study-subtitle">扫码后按当天情况选择对应任务。无需截图反馈，后台会自动记录。</p>
      </header>

      <nav class="task-list" aria-label="实验每日任务">
        <a class="btn" id="morning-link" href="#" rel="noopener">
          <span class="code">01</span>
          <span class="main">
            <span class="name">晨间睡眠记录</span>
            <span class="desc">起床后填写，约30–45秒</span>
          </span>
          <span class="hint">›</span>
        </a>

        <a class="btn" id="evening-link" href="#" rel="noopener">
          <span class="code">02</span>
          <span class="main">
            <span class="name">睡前状态记录</span>
            <span class="desc">睡前填写，记录今日状态</span>
          </span>
          <span class="hint">›</span>
        </a>

        <a class="btn" id="upload-link" href="#" rel="noopener">
          <span class="code">03</span>
          <span class="main">
            <span class="name">光照/GPS数据回传</span>
            <span class="desc">上传当日光照文件与GPS轨迹</span>
          </span>
          <span class="hint">›</span>
        </a>

        <a class="btn secondary" id="gps-guide-link" href="#" rel="noopener">
          <span class="code">04</span>
          <span class="main">
            <span class="name">GPS记录操作协议</span>
            <span class="desc">查看线路追踪与保存方式</span>
          </span>
          <span class="hint">›</span>
        </a>

        <a class="btn secondary" id="guide-link" href="#" rel="noopener">
          <span class="code">05</span>
          <span class="main">
            <span class="name">光谱仪操作协议</span>
            <span class="desc">查看光照设备记录与保存方式</span>
          </span>
          <span class="hint">›</span>
        </a>
      </nav>

      <div class="notice" id="notice-box"></div>

      <div class="contact" aria-label="主试联系方式">
        <span class="label">Principal Contact</span>
        主试电话：<a href="tel:18845709176">18845709176</a>
      </div>
    </section>

    <p class="footer"><strong>感谢您为理解人与光的关系所做出的贡献！</strong> </p>
  </main>

  <script>
    const cfg = window.EXP_CONFIG || {};
    const links = cfg.links || {};

    document.title = cfg.studyTitle || "光迹计划（北京）";

    document.getElementById("study-title").textContent = cfg.studyTitle || "光迹计划（北京）";
    document.getElementById("study-subtitle").textContent =
      cfg.shortTitle || "扫码后按当天情况选择对应任务。无需截图反馈，后台会自动记录。";

    const setHref = (id, href) => {
      const el = document.getElementById(id);
      if (!el) return;

      if (!href) {
        el.href = "javascript:void(0)";
        el.setAttribute("aria-disabled", "true");
        el.style.opacity = "0.55";
        return;
      }

      el.href = href;
      if (/^https?:\/\//.test(href)) el.target = "_blank";
    };

    setHref("morning-link", links.morningSurvey);
    setHref("evening-link", links.eveningSurvey);
    setHref("upload-link", links.uploadPortal);
    setHref("gps-guide-link", links.gpsGuide);
    setHref("guide-link", links.deviceGuide);

    const noticeBox = document.getElementById("notice-box");
    const notices = cfg.notices || [
      "无需截图反馈，后台会自动记录填写与上传情况。",
      "若记录缺失、设备异常、无法上传或忘记编号，请直接联系主试。"
    ];

    const lightName = cfg.uploadNaming?.light || "005_20260706L.csv";
    const gpsName = cfg.uploadNaming?.gps || "005_20260706G.gpx";

    noticeBox.innerHTML = `
      ${notices.map(x => `<p>${x}</p>`).join("")}
      <div class="notice-title">上传文件命名提醒</div>
      <ol class="notice-list">
        <li>光照文件示例：${lightName}</li>
        <li>GPS 文件示例：${gpsName}</li>
      </ol>
    `;
  </script>
</body>
</html>
